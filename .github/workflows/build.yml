name: Build Resume PDF

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX to PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: resumeAhmadUsama-pdf
          path: main.pdf

      - name: Get current date
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: date
        run: echo "date=$(date +'%Y-%m-%d_%H%M')" >> $GITHUB_OUTPUT

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.date.outputs.date }}
          name: Resume Build ${{ steps.date.outputs.date }}
          body: Automated resume PDF build from commit ${{ github.sha }}
          files: main.pdf
