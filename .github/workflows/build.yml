name: Build Resume PDF

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX to PDF
        id: compile
        uses: thomas-chauvet/latex2pdf-action@v2
        with:
          output_dir: output
          main_latex_file: main.tex
          ctan_packages: "latexsym preprint titlesec marvosym enumitem fancyhdr hyperref etoolbox tools babel-english"

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume-pdf
          path: output/main.pdf
