name: Build Resume PDF

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX to PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: resumeAhmadUsama-pdf
          path: main.pdf

      - name: Get current date and rename PDF
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: date
        run: |
          DATE_TAG=$(date +'%Y-%m-%d_%H%M')
          DATE_FILE=$(date +'%d%m%Y')
          echo "tag=$DATE_TAG" >> $GITHUB_OUTPUT
          echo "filename=resume_ahmadUsama($DATE_FILE).pdf" >> $GITHUB_OUTPUT
          mv main.pdf "resume_ahmadUsama($DATE_FILE).pdf"

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.date.outputs.tag }}
          name: Resume Build ${{ steps.date.outputs.tag }}
          body: Automated resume PDF build from commit ${{ github.sha }}
          files: ${{ steps.date.outputs.filename }}
